<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storytelling from Features | Qargo Solution Engineering</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --qargo-green: #00E85B;
      --qargo-navy: #1C2C31;
      --qargo-navy-90: #304045;
      --qargo-navy-70: #606B6F;
      --qargo-navy-10: #D4E1E5;
      --secondary-green: #24D269;
      --mint-tint: #EBFFF5;
      --light-green: #F4FBF7;
      --off-white: #FEFEFE;
      --light-grey: #EBF2EF;
      --dark-grey: #BBC0C1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--qargo-navy);
      color: var(--off-white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* âââ HERO SECTION âââ */
    .hero {
      position: relative;
      padding: 60px 40px 50px;
      background: linear-gradient(135deg, var(--qargo-navy) 0%, #243840 100%);
      overflow: hidden;
      text-align: center;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -120px;
      width: 400px;
      height: 400px;
      background: var(--qargo-green);
      clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%);
      opacity: 0.06;
      transform: rotate(-15deg);
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -80px;
      width: 300px;
      height: 300px;
      background: var(--qargo-green);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      opacity: 0.04;
    }

    .logo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
    }

    .badge {
      display: inline-block;
      background: rgba(0, 232, 91, 0.12);
      color: var(--qargo-green);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(0, 232, 91, 0.2);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 16px;
      color: var(--off-white);
    }

    .hero h1 span {
      background: linear-gradient(90deg, var(--qargo-green), var(--secondary-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 17px;
      color: var(--dark-grey);
      max-width: 580px;
      margin: 0 auto;
      font-weight: 400;
    }

    /* âââ WALKTHROUGH INTRO âââ */
    .walkthrough-intro {
      padding: 0 40px 50px;
      background: var(--qargo-navy);
    }

    .walkthrough-steps {
      max-width: 800px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .wt-step {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 28px 24px;
      text-align: center;
      position: relative;
      transition: border-color 0.3s, transform 0.2s;
    }

    .wt-step:hover {
      border-color: rgba(0, 232, 91, 0.25);
      transform: translateY(-3px);
    }

    .wt-step-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin: 0 auto 16px;
      font-weight: 700;
    }

    .wt-step:nth-child(1) .wt-step-icon {
      background: linear-gradient(135deg, var(--qargo-green), #00c94e);
      color: var(--qargo-navy);
    }

    .wt-step:nth-child(2) .wt-step-icon {
      background: linear-gradient(135deg, #36BB6B, var(--secondary-green));
      color: var(--qargo-navy);
    }

    .wt-step:nth-child(3) .wt-step-icon {
      background: linear-gradient(135deg, var(--qargo-navy), var(--qargo-navy-90));
      color: var(--qargo-green);
      border: 2px solid var(--qargo-green);
    }

    .wt-step h4 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--off-white);
    }

    .wt-step p {
      font-size: 13px;
      color: var(--dark-grey);
      line-height: 1.6;
    }

    .wt-arrow {
      display: none;
    }

    @media (min-width: 769px) {
      .wt-step {
        position: relative;
      }
      .wt-step:not(:last-child)::after {
        content: '';
        position: absolute;
        top: 50%;
        right: -14px;
        width: 8px;
        height: 8px;
        border-top: 2px solid var(--qargo-green);
        border-right: 2px solid var(--qargo-green);
        transform: translateY(-50%) rotate(45deg);
        opacity: 0.4;
      }
    }
